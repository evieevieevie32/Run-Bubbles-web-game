        <div class="score-display">FINAL DISTANCE: <span id="finalScore">0</span>m</div>
        <div class="banana-display">BANANAS COLLECTED: <span id="finalBananas">0</span></div>
        <button class="btn gold-btn" onclick="startGame()">Restart</button>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>
</div>

<script src="game.js"></script>
</body>
